<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#091416">
    <meta
        name="description"
        content="Listen to Gates of Okinawa by Keith Hayden with saved chapter progress, playback controls, and a sleep timer."
    >
    <title>Gates of Okinawa | Audiobook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark audiobook-page">
    <main class="listen-shell audiobook-mode">
        <header class="listen-header">
            <div>
                <p class="eyebrow">Listen mode</p>
                <h1>Gates of Okinawa</h1>
            </div>

            <div class="listen-nav">
                <a class="button-link inline-link" href="index.html">Home</a>
                <a class="button-link inline-link" href="reader.html">Read Mode</a>
            </div>
        </header>

        <section class="listen-layout">
            <article class="player-panel">
                <img src="assets/gates-of-okinawa-audiobook-cover.png" alt="Gates of Okinawa audiobook cover" class="audio-cover">
                <p class="player-label">Now selected</p>
                <h2 id="audio-book-title">Gates of Okinawa</h2>
                <p id="current-chapter-title" class="current-chapter-title">Loading tracks...</p>
                <p id="chapter-hint" class="chapter-hint">Choose a chapter, then press play when you're ready.</p>

                <audio id="chapter-audio" preload="metadata" class="audio-element"></audio>

                <div class="playback-cluster" aria-label="Audiobook controls">
                    <div class="playback-buttons">
                        <button id="prev-track-btn" type="button" class="transport-button">Previous</button>
                        <button id="skip-backward-btn" type="button" class="transport-button compact">-15s</button>
                        <button id="play-pause-btn" type="button" class="transport-button primary">Play</button>
                        <button id="skip-forward-btn" type="button" class="transport-button compact">+30s</button>
                        <button id="next-track-btn" type="button" class="transport-button">Next</button>
                    </div>

                    <input id="seek-bar" class="progress-input" type="range" min="0" max="0" value="0" step="1" aria-label="Seek within current track">

                    <div class="time-row" aria-label="Playback time">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>

                    <div class="audio-actions">
                        <div class="speed-row">
                            <label for="speed-select">Speed</label>
                            <select id="speed-select" aria-label="Playback speed">
                                <option value="0.8">0.8x</option>
                                <option value="1">1x</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                                <option value="1.75">1.75x</option>
                                <option value="2">2x</option>
                            </select>
                        </div>

                        <div class="sleep-timer-wrap">
                            <button
                                id="sleep-timer-btn"
                                type="button"
                                class="transport-button sleep-timer-button"
                                aria-haspopup="true"
                                aria-expanded="false"
                                aria-controls="sleep-timer-menu"
                            >
                                <span aria-hidden="true">zZz</span>
                                <span id="sleep-timer-label">Sleep timer</span>
                            </button>
                            <div id="sleep-timer-menu" class="sleep-timer-menu" role="menu" hidden>
                                <button type="button" role="menuitemradio" data-sleep-option="off">Off</button>
                                <button type="button" role="menuitemradio" data-sleep-option="15">15 minutes</button>
                                <button type="button" role="menuitemradio" data-sleep-option="30">30 minutes</button>
                                <button type="button" role="menuitemradio" data-sleep-option="45">45 minutes</button>
                                <button type="button" role="menuitemradio" data-sleep-option="60">60 minutes</button>
                                <button type="button" role="menuitemradio" data-sleep-option="chapter">End of chapter</button>
                            </div>
                        </div>
                    </div>
                </div>

                <p id="audio-status" class="audio-status" role="status" aria-live="polite">
                    Loading audiobook manifest...
                </p>
            </article>

            <aside class="chapters-panel" aria-label="Audiobook chapters">
                <div class="chapters-header">
                    <h2>Chapters</h2>
                    <span id="chapter-count" class="chapter-count">0 tracks</span>
                </div>
                <ul id="audio-chapter-list" class="audio-chapter-list"></ul>
            </aside>
        </section>
    </main>

    <script src="listen.js"></script>
</body>
</html>
