<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10201E">
    <meta
        name="description"
        content="Open Gates of Okinawa by Keith Hayden in a cinematic EPUB reading app with saved progress, immersive controls, and atmospheric dark styling."
    >
    <title>Gates of Okinawa | Reading App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark home-page">
    <main class="mode-shell">
        <section class="hero-card">
            <div class="hero-brand">
                <img src="assets/hack-studios-logo.png" alt="HAC Studios logo" class="hero-logo">
                <div>
                    <p class="eyebrow">HAC Studios</p>
                    <p class="brand-subline">Reader Edition</p>
                </div>
            </div>

            <div class="hero-stage">
                <div class="hero-art-frame">
                    <img src="assets/gates-cover.jpg" alt="Gates of Okinawa cover" class="hero-cover">
                </div>

                <div class="hero-copy">
                    <p class="hero-kicker">Supernatural horror adventure</p>
                    <h1>Gates of Okinawa</h1>
                    <p class="hero-summary">By Keith Hayden</p>
                    <p class="hero-tagline">An eerie reading experience built for dusk-lit shrines, hidden paths, and the pull of old spirits.</p>

                    <div class="hero-actions">
                        <a class="button-link primary-link" href="reader.html">Start Reading</a>
                        <p class="hero-note">Saved reading progress, theme, and font size continue automatically on this device.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
